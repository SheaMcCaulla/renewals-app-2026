<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>2026 Renewals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0f0f11;
  --surface: #17171a;
  --surface2: #1d1d21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0f0f2;
  --muted: #72727d;
  --faint: #35353e;
  --amber: #f0a500;
  --amber-dim: rgba(240,165,0,0.12);
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.12);
  --blue: #5b9cf6;
  --blue-dim: rgba(91,156,246,0.12);
  --green: #4caf7d;
  --green-dim: rgba(76,175,125,0.12);
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 8px;
  --rl: 12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,17,0.9);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 32px;height:56px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.hdr-left{display:flex;align-items:center;gap:14px}
.wordmark{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--amber);letter-spacing:.08em;text-transform:uppercase}
.hdr-sep{width:1px;height:18px;background:var(--border2)}
.hdr-sub{font-size:12px;color:var(--muted)}
.hdr-right{font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ── Layout ── */
.main{padding:28px 32px;max-width:1440px;margin:0 auto}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.sc{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
  padding:16px 20px;position:relative;overflow:hidden;
}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc.a::after{background:var(--amber)}
.sc.r::after{background:var(--red)}
.sc.b::after{background:var(--blue)}
.sc.g::after{background:var(--faint)}
.sc-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sc-val{font-size:30px;font-weight:300;letter-spacing:-.02em}
.sc.a .sc-val{color:var(--amber)}
.sc.r .sc-val{color:var(--red)}
.sc.b .sc-val{color:var(--blue)}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.filters{display:flex;gap:4px;flex-wrap:wrap}
.fb{
  font-family:var(--mono);font-size:11px;padding:5px 13px;
  border:1px solid var(--border2);border-radius:100px;
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.fb:hover{border-color:var(--amber);color:var(--text)}
.fb.on{background:var(--amber);border-color:var(--amber);color:#000;font-weight:500}
.srch{position:relative}
.srch input{
  background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text);font-family:var(--mono);font-size:12px;
  padding:7px 12px 7px 32px;width:230px;outline:none;transition:border-color .15s;
}
.srch input:focus{border-color:var(--amber)}
.srch input::placeholder{color:var(--muted)}
.srch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);pointer-events:none}

/* ── Table ── */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--rl);overflow:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:800px}
thead tr{background:var(--surface2)}
th{
  font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;white-space:nowrap;transition:color .1s;
}
th:hover{color:var(--text)}
th.sorted{color:var(--amber)}
.arr{margin-left:4px;opacity:.4;font-size:10px}
th.sorted .arr{opacity:1}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface)}
td{padding:11px 16px;font-size:13px;vertical-align:middle}

/* ── Cell components ── */
.co-wrap{display:flex;align-items:center;gap:0;flex-wrap:wrap;gap:4px}
.co-name{font-weight:500}
.pill{
  display:inline-flex;font-family:var(--mono);font-size:10px;font-weight:500;
  padding:2px 7px;border-radius:4px;white-space:nowrap;
}
.pill-notice{background:var(--blue-dim);color:var(--blue)}
.pill-ic{background:rgba(255,255,255,0.05);color:var(--muted)}
.pill-ar{background:var(--amber-dim);color:var(--amber)}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10px;font-weight:500;
  padding:3px 8px;border-radius:100px;white-space:nowrap;
}
.badge-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,85,85,.2)}
.badge-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(240,165,0,.2)}
.badge-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,156,246,.2)}
.badge-gray{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border2)}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0}

.date-val{font-family:var(--mono);font-size:12px}
.date-hint{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}

.val{font-family:var(--mono);font-size:12px;color:var(--muted)}
.val-tbd{font-family:var(--mono);font-size:12px;color:var(--faint);font-style:italic}

.db{
  font-family:var(--mono);font-size:11px;padding:5px 13px;
  border:1px solid var(--border2);border-radius:var(--r);
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.db:hover{border-color:var(--amber);color:var(--amber)}
.db.bump:hover{border-color:var(--blue);color:var(--blue)}
.db.done{border-color:var(--green);color:var(--green);pointer-events:none}
.db.loading{opacity:.4;pointer-events:none}
.na{font-family:var(--mono);font-size:11px;color:var(--faint)}

.empty{padding:48px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--muted)}

/* ── Toast ── */
#toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);
  padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--text);
  z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;max-width:340px;
}
#toast.show{opacity:1}

/* ── Footer ── */
.footer{
  padding:20px 32px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  margin-top:40px;
}
.fn{font-family:var(--mono);font-size:11px;color:var(--muted)}

@media(max-width:768px){
  .main,.hdr,.footer{padding-left:16px;padding-right:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .srch input{width:160px}
}
</style>
</head>
<body>

<div id="toast"></div>

<header class="hdr">
  <div class="hdr-left">
    <span class="wordmark">Renewals</span>
    <div class="hdr-sep"></div>
    <span class="hdr-sub">2026 Pipeline · Shea McCaulla</span>
  </div>
  <div class="hdr-right" id="hdr-date"></div>
</header>

<main class="main">
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <div class="srch">
      <svg class="srch-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6.5" cy="6.5" r="4"/><path d="M10.5 10.5l3 3"/>
      </svg>
      <input id="search-input" placeholder="Search accounts…" oninput="onSearch(this.value)"/>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<footer class="footer">
  <span class="fn">Renewal target = CRM close date &nbsp;·&nbsp; Auto-renewal clause included where flagged</span>
  <span class="fn" id="footer-drafted"></span>
</footer>

<script>
const DATA = [
  {co:"Foursquare",close:"4/4/2026",amt:48000,stage:"Renewal Notice Sent",ar:false},
  {co:"Zoopla",close:"4/30/2026",amt:0,stage:"In Contract",ar:false},
  {co:"Cardlytics",close:"5/1/2026",amt:60000,stage:"Renewal Notice Sent",ar:false},
  {co:"Flipp",close:"5/1/2026",amt:25200,stage:"Renewal Notice Sent",ar:false},
  {co:"Dock",close:"5/1/2026",amt:26200,stage:"Renewal Notice Sent",ar:false},
  {co:"Pismo",close:"5/2/2026",amt:34200,stage:"In Contract",ar:false},
  {co:"Amazon",close:"5/2/2026",amt:45000,stage:"In Contract",ar:true},
  {co:"Seismic",close:"5/16/2026",amt:36000,stage:"In Contract",ar:true},
  {co:"Rocket Mortgage",close:"5/19/2026",amt:60000,stage:"In Contract",ar:false},
  {co:"PagBank PagSeguro",close:"6/1/2026",amt:48000,stage:"In Contract",ar:false},
  {co:"Aarin Tech-fin",close:"6/1/2026",amt:36000,stage:"Renewal Notice Sent",ar:true},
  {co:"PubMatic",close:"6/5/2026",amt:48000,stage:"Renewal Notice Sent",ar:false},
  {co:"Trustly",close:"6/8/2026",amt:0,stage:"In Contract",ar:true},
  {co:"BedrockStreaming",close:"6/14/2026",amt:36000,stage:"In Contract",ar:true},
  {co:"Laminar",close:"7/1/2026",amt:24000,stage:"In Contract",ar:false},
  {co:"ZIP",close:"8/1/2026",amt:14400,stage:"In Contract",ar:false},
  {co:"Socure",close:"8/1/2026",amt:35000,stage:"In Contract",ar:true},
  {co:"Miro",close:"8/3/2026",amt:18000,stage:"In Contract",ar:false},
  {co:"Hitachi Solutions America",close:"8/11/2026",amt:31800,stage:"In Contract",ar:true},
  {co:"SpotOn",close:"8/30/2026",amt:48000,stage:"In Contract",ar:false},
  {co:"Repay",close:"9/1/2026",amt:45000,stage:"In Contract",ar:false},
  {co:"AutoStore",close:"9/1/2026",amt:24000,stage:"In Contract",ar:true},
  {co:"Impact",close:"9/1/2026",amt:28800,stage:"In Contract",ar:false},
  {co:"Greenway Health",close:"9/9/2026",amt:36000,stage:"In Contract",ar:true},
  {co:"Citrus Ad",close:"9/13/2026",amt:24000,stage:"In Contract",ar:true},
  {co:"Avaya",close:"9/17/2026",amt:48000,stage:"In Contract",ar:false},
  {co:"Affirm",close:"9/20/2026",amt:52800,stage:"In Contract",ar:false},
  {co:"Walmart",close:"9/20/2026",amt:123600,stage:"In Contract",ar:false},
  {co:"Symcor",close:"9/22/2026",amt:72600,stage:"In Contract",ar:true},
  {co:"Kno2",close:"9/25/2026",amt:25800,stage:"In Contract",ar:true},
  {co:"Ocrolus",close:"9/30/2026",amt:18000,stage:"In Contract",ar:true},
  {co:"Branch App",close:"9/30/2026",amt:49800,stage:"In Contract",ar:true},
  {co:"BeyondTrust",close:"10/1/2026",amt:114000,stage:"In Contract",ar:false},
  {co:"Apple",close:"10/1/2026",amt:111600,stage:"In Contract",ar:false},
  {co:"Pearson",close:"10/11/2026",amt:51600,stage:"In Contract",ar:true},
  {co:"TAURUS Group",close:"10/14/2026",amt:26400,stage:"In Contract",ar:true},
  {co:"Ice.com",close:"10/18/2026",amt:54000,stage:"In Contract",ar:false},
  {co:"Paydock",close:"10/18/2026",amt:24000,stage:"In Contract",ar:true},
  {co:"Kustomer",close:"10/19/2026",amt:24000,stage:"In Contract",ar:false},
  {co:"PagerDuty",close:"10/25/2026",amt:48000,stage:"In Contract",ar:false},
  {co:"FIS Global",close:"11/30/2026",amt:54000,stage:"In Contract",ar:false},
  {co:"IBM",close:"11/30/2026",amt:60000,stage:"In Contract",ar:false},
  {co:"OCR Labs",close:"12/1/2026",amt:24000,stage:"In Contract",ar:false},
  {co:"Tenable Network Security",close:"12/4/2026",amt:36000,stage:"In Contract",ar:false},
  {co:"MURAL",close:"12/7/2026",amt:24000,stage:"In Contract",ar:false},
  {co:"FintechOS",close:"12/12/2026",amt:18000,stage:"In Contract",ar:true},
  {co:"Lightcast",close:"12/16/2026",amt:45000,stage:"In Contract",ar:true},
  {co:"AtomicVest",close:"12/23/2026",amt:24000,stage:"In Contract",ar:false},
];

// Persist drafted state across visits
const STORE = 'renewals_2026_drafted';
let drafted = {};
try { drafted = JSON.parse(localStorage.getItem(STORE)||'{}'); } catch(e){}
function save(){ try{ localStorage.setItem(STORE,JSON.stringify(drafted)); }catch(e){} }

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let filterState = 'actionable', searchVal = '', sortCol = 'close', sortDir = 1;

// Helpers
function pd(s){ const[m,d,y]=s.split('/'); return new Date(+y,+m-1,+d); }
function du(s){ const d=pd(s); d.setHours(0,0,0,0); return Math.ceil((d-TODAY)/86400000); }
function fd(s){ return pd(s).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
function fv(v){ return v===0?null:'$'+v.toLocaleString(); }

function roundDays(d){
  if(d<=0) return d;
  if(d<=90) return Math.round(d/5)*5||5;
  return [90,120,150,180,270,365].reduce((a,b)=>Math.abs(b-d)<Math.abs(a-d)?b:a);
}
function dayLabel(d){
  if(d<=0) return 'past due';
  const r=roundDays(d);
  return d<=90?`~${r} days`:`${r} days`;
}

function draftType(a){
  if(a.stage==='Closed Won'||a.stage==='Closed Lost') return null;
  if(a.stage==='Renewal Notice Sent') return 'bump';
  return 'awareness';
}

function statusBadge(d){
  if(d<0)  return {cls:'badge-red',  dot:'#e05555', label:'Past due'};
  if(d<=30) return {cls:'badge-red',  dot:'#e05555', label:d+'d'};
  if(d<=90) return {cls:'badge-amber',dot:'#f0a500', label:d+'d'};
  if(d<=180)return {cls:'badge-blue', dot:'#5b9cf6', label:d+'d'};
  return           {cls:'badge-gray', dot:'#72727d', label:d+'d'};
}

const AR_CLAUSE = `Please note: you have an auto-renewal clause active in the current signed MSA. The agreement will auto-renew for an additional term per the terms of that MSA unless your team decides to make a licensing change to the contract or opts to terminate. Notice is required within 30 days of the renewal term start date.`;

function buildEmail(a){
  const d=du(a.close), lbl=dayLabel(d), ds=fd(a.close);
  const arLine = a.ar ? `\n\n${AR_CLAUSE}` : '';
  const pastDue = d <= 0;
  const type = draftType(a);

  if(type==='bump'){
    const timing = pastDue
      ? `your renewal target date of ${ds} has now passed`
      : `there are ${lbl} to go before your renewal date of ${ds}`;
    return {
      subject: pastDue
        ? `Re: Renewal Notice – ${a.co} | Still working to close`
        : `Re: Renewal Notice – ${a.co} | ${lbl} to go`,
      body: `Hi ${a.co},\n\nI wanted to follow up — ${timing}. I sent over a renewal notice previously and want to make sure we get this across the line.\n\nPlease let me know if you have any questions or if there's anything holding things up on your end.${arLine}\n\nLooking forward to hearing from you.\n\nBest,\nShea McCaulla`
    };
  } else {
    const timing = pastDue
      ? `your renewal target date of ${ds} has now passed`
      : `there are ${lbl} to go before your renewal date of ${ds}`;
    return {
      subject: pastDue
        ? `Renewal Follow-Up – ${a.co}`
        : `Upcoming Renewal – ${a.co} | ${lbl} to go`,
      body: `Hi ${a.co},\n\nI hope you're doing well. I'm reaching out because ${timing}.\n\nI'd love to connect to review your current plan and make sure everything is aligned for the next term. Feel free to reply here or schedule a quick call — happy to walk through any questions or discuss options.${arLine}\n\nLooking forward to continuing our partnership.\n\nBest,\nShea McCaulla`
    };
  }
}

function showToast(msg, ok){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = ok ? '#4caf7d' : 'rgba(255,255,255,0.13)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3500);
}

async function createDraft(idx){
  const a = DATA[idx];
  const btn = document.getElementById('d'+idx);
  if(!btn) return;
  const type = draftType(a);
  if(!type) return;
  btn.textContent = 'Creating…'; btn.classList.add('loading');
  const email = buildEmail(a);
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        mcp_servers:[{type:'url',url:'https://gmailmcp.googleapis.com/mcp/v1',name:'gmail'}],
        messages:[{role:'user',content:`Create a Gmail draft with the exact subject and body below. Do not modify anything.\n\nSubject: ${email.subject}\n\nBody:\n${email.body}\n\nConfirm the draft was saved.`}]
      })
    });
    const data = await res.json();
    const txt = (data.content?.find(c=>c.type==='text')?.text||'').toLowerCase();
    if(txt.includes('draft')||txt.includes('creat')||txt.includes('success')){
      drafted[idx] = true; save();
      btn.textContent = 'Draft created'; btn.classList.remove('loading'); btn.classList.add('done');
      showToast((type==='bump'?'Bump':'Awareness')+' draft created for '+a.co, true);
      updateFooter();
    } else {
      btn.textContent = type==='bump'?'Draft bump':'Draft email';
      btn.classList.remove('loading');
      showToast('Failed — check Gmail connection', false);
    }
  } catch(e){
    btn.textContent = type==='bump'?'Draft bump':'Draft email';
    btn.classList.remove('loading');
    showToast('Error: '+e.message, false);
  }
}

function onSearch(v){ searchVal=v; render(); }
function setFilter(v){ filterState=v; render(); }
function toggleSort(col){ if(sortCol===col)sortDir*=-1; else{sortCol=col;sortDir=1;} render(); }

function getList(){
  let list = DATA.map((a,i)=>({...a,i}));
  if(filterState==='actionable') list=list.filter(a=>draftType(a)!==null);
  else if(filterState==='notice') list=list.filter(a=>a.stage==='Renewal Notice Sent');
  else if(filterState==='contract') list=list.filter(a=>a.stage==='In Contract');
  if(searchVal) list=list.filter(a=>a.co.toLowerCase().includes(searchVal.toLowerCase()));
  list.sort((a,b)=>{
    if(sortCol==='close') return sortDir*(pd(a.close)-pd(b.close));
    if(sortCol==='amt') return sortDir*(a.amt-b.amt);
    if(sortCol==='co') return sortDir*a.co.localeCompare(b.co);
    return 0;
  });
  return list;
}

function updateFooter(){
  const count = Object.values(drafted).filter(Boolean).length;
  const el = document.getElementById('footer-drafted');
  if(el) el.textContent = count > 0 ? `${count} draft${count!==1?'s':''} created this session` : '';
}

function render(){
  const list = getList();
  const actionable = DATA.filter(a=>draftType(a)!==null);
  const notices = DATA.filter(a=>a.stage==='Renewal Notice Sent');
  const inContract = DATA.filter(a=>a.stage==='In Contract');
  const within90 = actionable.filter(a=>{ const d=du(a.close); return d>=0&&d<=90; }).length;
  const pastDue = actionable.filter(a=>du(a.close)<0).length;

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="sc a"><div class="sc-label">Open renewals</div><div class="sc-val">${actionable.length}</div></div>
    <div class="sc a"><div class="sc-label">Within 90 days</div><div class="sc-val a">${within90}</div></div>
    <div class="sc r"><div class="sc-label">Past target date</div><div class="sc-val r">${pastDue}</div></div>
    <div class="sc b"><div class="sc-label">Notice sent</div><div class="sc-val b">${notices.length}</div></div>
  `;

  // Filters
  const fb = (v,l) => `<button class="fb${filterState===v?' on':''}" onclick="setFilter('${v}')">${l}</button>`;
  document.getElementById('filters').innerHTML =
    fb('actionable','All active ('+actionable.length+')')+
    fb('notice','Notice sent ('+notices.length+')')+
    fb('contract','In contract ('+inContract.length+')')+
    fb('all','All');

  // Header
  const arr = col => `<span class="arr">${sortCol===col?(sortDir===1?'▲':'▼'):'↕'}</span>`;
  const sc = col => sortCol===col?' sorted':'';
  document.getElementById('thead-row').innerHTML = `
    <th style="width:28%" class="${sc('co')}" onclick="toggleSort('co')">Company${arr('co')}</th>
    <th style="width:17%" class="${sc('close')}" onclick="toggleSort('close')">Renewal target${arr('close')}</th>
    <th style="width:13%">Status</th>
    <th style="width:13%" class="${sc('amt')}" onclick="toggleSort('amt')">Value${arr('amt')}</th>
    <th style="width:29%">Gmail draft</th>
  `;

  // Rows
  if(!list.length){
    document.getElementById('tbody').innerHTML = `<tr><td colspan="5" class="empty">No accounts match</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = list.map(a => {
    const d = du(a.close);
    const s = statusBadge(d);
    const type = draftType(a);
    const lbl = dayLabel(d);

    const arPill = a.ar && type ? `<span class="pill pill-ar">auto-renew</span>` : '';
    const stagePill = a.stage==='Renewal Notice Sent'
      ? `<span class="pill pill-notice">notice sent</span>`
      : a.stage==='In Contract'
        ? `<span class="pill pill-ic">in contract</span>`
        : '';

    const draftCell = !type
      ? `<span class="na">—</span>`
      : drafted[a.i]
        ? `<button class="db done" id="d${a.i}">Draft created</button>`
        : `<button class="db${type==='bump'?' bump':''}" id="d${a.i}" onclick="createDraft(${a.i})">${type==='bump'?'Draft bump':'Draft email'}</button>`;

    const valCell = a.amt===0
      ? `<span class="val-tbd">TBD</span>`
      : `<span class="val">${fv(a.amt)}</span>`;

    return `<tr>
      <td>
        <div class="co-wrap">
          <span class="co-name">${a.co}</span>
          ${stagePill}${arPill}
        </div>
      </td>
      <td>
        <div class="date-val">${fd(a.close)}</div>
        <div class="date-hint">${lbl}</div>
      </td>
      <td><span class="badge ${s.cls}"><span class="dot" style="background:${s.dot}"></span>${s.label}</span></td>
      <td>${valCell}</td>
      <td>${draftCell}</td>
    </tr>`;
  }).join('');

  updateFooter();
}

// Init
document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
render();
</script>
</body>
</html>
